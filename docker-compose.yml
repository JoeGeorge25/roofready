version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: roofready-db
    environment:
      POSTGRES_DB: roofready
      POSTGRES_USER: roofready_user
      POSTGRES_PASSWORD: roofready_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roofready_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: roofready-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@roofready.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: